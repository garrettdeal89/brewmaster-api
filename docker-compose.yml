services:

  postgres:
    image: postgres:17

    container_name: brewmaster-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: brewmaster
      POSTGRES_USER: brewmaster
      POSTGRES_PASSWORD: brewmaster

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: