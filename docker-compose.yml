services:
  postgres:
    image: postgres:17
    container_name: brewmaster-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: brewmaster
      POSTGRES_USER: brewmaster
      POSTGRES_PASSWORD: brewmaster

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brewmaster -d brewmaster"]
      interval: 5s
      timeout: 5s
      retries: 10


  postgres-test:
    image: postgres:17
    container_name: brewmaster-postgres-test
    restart: unless-stopped

    environment:
      POSTGRES_DB: brewmaster_test
      POSTGRES_USER: brewmaster
      POSTGRES_PASSWORD: brewmaster

    ports:
      - "5433:5432"

    tmpfs:
      - /var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brewmaster -d brewmaster_test"]
      interval: 5s
      timeout: 5s
      retries: 10


  pgadmin:
    image: dpage/pgadmin4
    container_name: brewmaster-pgadmin
    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@brewmaster.com
      PGADMIN_DEFAULT_PASSWORD: admin

    ports:
      - "5050:80"

    volumes:
      - pgadmin-data:/var/lib/pgadmin

    depends_on:
      postgres:
        condition: service_healthy


volumes:
  postgres-data:
  pgadmin-data: