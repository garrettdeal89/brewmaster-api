services:

  postgres:
    image: postgres:17

    container_name: brewmaster-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: brewmaster
      POSTGRES_USER: brewmaster
      POSTGRES_PASSWORD: brewmaster

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data


  pgadmin:
    image: dpage/pgadmin4

    container_name: brewmaster-pgadmin

    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@brewmaster.com
      PGADMIN_DEFAULT_PASSWORD: admin

    ports:
      - "5050:80"


volumes:
  postgres-data: